{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product: {{ product.name }}{% endblock %}

{% block content %}
<div class="dashboard-grid animate-fade" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
    <div class="hub-card">
        <h3 style="color: var(--accent-blue); margin-bottom: 20px;">Product Details</h3>
        <form method="POST" action="{{ url_for('inventory.edit_product', id=product.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-light); margin-bottom: 5px;">Name</label>
                <input type="text" name="name" value="{{ product.name }}" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-light); margin-bottom: 5px;">SKU</label>
                <input type="text" name="sku" value="{{ product.sku }}" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-light); margin-bottom: 5px;">Price (FCFA)</label>
                <input type="number" step="0.01" name="unit_price" value="{{ product.unit_price }}" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-light); margin-bottom: 5px;">Quantity</label>
                <input type="number" name="quantity" value="{{ product.quantity }}" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-light); margin-bottom: 5px;">Location</label>
                <input type="text" name="location" value="{{ product.location }}" required style="width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 4px;">
            </div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                <a href="{{ url_for('inventory.admin_db') }}" class="btn btn-outline" style="flex: 1; text-align: center; text-decoration: none;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
