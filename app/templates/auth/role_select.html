{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px); background: radial-gradient(circle at center, rgba(102, 252, 241, 0.05), #000000); margin: -30px;">
    <div class="hub-card animate-fade" style="width: 100%; max-width: 520px; padding: 50px 40px; background: linear-gradient(145deg, #0b0c10, #000000); box-shadow: 0 0 50px rgba(102, 252, 241, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.9); border: 1px solid rgba(102, 252, 241, 0.6); text-align: center;">
        
        <!-- Logo -->
        <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), rgba(102,252,241,0.3)); margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 0 30px rgba(102,252,241,0.3);">
            🏢
        </div>
        
        <h2 style="color: var(--text-light); margin-bottom: 10px; font-size: 1.6rem;">Inventory Management System</h2>
        <p style="color: var(--text-primary); margin-bottom: 40px; font-size: 0.95rem;">Choose your login portal to continue</p>
        
        <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <!-- Admin Portal -->
            <a href="{{ url_for('auth.admin_login') }}" style="text-decoration: none; flex: 1; min-width: 180px;">
                <div style="padding: 30px 20px; border-radius: 12px; border: 1px solid rgba(102,252,241,0.3); background: linear-gradient(145deg, rgba(10,13,18,0.9), rgba(6,7,9,0.95)); cursor: pointer; transition: all 0.3s ease;" 
                     onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 25px rgba(102,252,241,0.2)'; this.style.borderColor='rgba(102,252,241,0.6)';"
                     onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'; this.style.borderColor='rgba(102,252,241,0.3)';">
                    <div style="font-size: 2.5rem; margin-bottom: 12px;">🔐</div>
                    <h3 style="color: var(--accent-blue); margin-bottom: 8px; font-size: 1.1rem;">Admin Portal</h3>
                    <p style="color: var(--text-primary); font-size: 0.8rem; line-height: 1.4;">System administrators & staff access</p>
                </div>
            </a>
            
            <!-- Supplier Portal -->
            <a href="{{ url_for('auth.supplier_login') }}" style="text-decoration: none; flex: 1; min-width: 180px;">
                <div style="padding: 30px 20px; border-radius: 12px; border: 1px solid rgba(255,193,7,0.3); background: linear-gradient(145deg, rgba(10,13,18,0.9), rgba(6,7,9,0.95)); cursor: pointer; transition: all 0.3s ease;"
                     onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 8px 25px rgba(255,193,7,0.2)'; this.style.borderColor='rgba(255,193,7,0.6)';"
                     onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'; this.style.borderColor='rgba(255,193,7,0.3)';">
                    <div style="font-size: 2.5rem; margin-bottom: 12px;">📦</div>
                    <h3 style="color: var(--warning); margin-bottom: 8px; font-size: 1.1rem;">Supplier Portal</h3>
                    <p style="color: var(--text-primary); font-size: 0.8rem; line-height: 1.4;">Vendors & product suppliers access</p>
                </div>
            </a>
        </div>

        <div style="margin-top: 35px; padding-top: 20px; border-top: 1px solid rgba(102,252,241,0.15);">
            <p style="color: var(--text-primary); font-size: 0.85rem;">Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-blue);">Register</a></p>
        </div>
    </div>
</div>
{% endblock %}
